<script type="text/babel">
const{useState,useMemo,useEffect,useCallback}=React;
const{AreaChart,Area,XAxis,YAxis,Tooltip:RTooltip,ResponsiveContainer,BarChart,Bar,CartesianGrid,ReferenceLine,Cell,PieChart,Pie}=Recharts;

// ═══ INDICATORS ═══
function sma(d,p){return d.map((_,i)=>i<p-1?null:d.slice(i-p+1,i+1).reduce((s,x)=>s+x.close,0)/p)}
function ema(d,p){const k=2/(p+1),r=[];let v=null;for(let i=0;i<d.length;i++){if(i<p-1){r.push(null);continue}v=v===null?d.slice(0,p).reduce((s,x)=>s+x.close,0)/p:d[i].close*k+v*(1-k);r.push(v)}return r}
function calcRsi(d,p=14){const r=Array(d.length).fill(null);if(d.length<=p)return r;let ag=0,al=0;for(let i=1;i<=p;i++){const df=d[i].close-d[i-1].close;if(df>0)ag+=df;else al-=df}ag/=p;al/=p;r[p]=al===0?100:100-100/(1+ag/al);for(let i=p+1;i<d.length;i++){const df=d[i].close-d[i-1].close;ag=(ag*(p-1)+(df>0?df:0))/p;al=(al*(p-1)+(df<0?-df:0))/p;r[i]=al===0?100:100-100/(1+ag/al)}return r}
function bbands(d,p=20,m=2){const mid=sma(d,p);return d.map((_,i)=>{if(mid[i]===null)return{u:null,m:null,l:null};const std=Math.sqrt(d.slice(i-p+1,i+1).reduce((s,x)=>s+(x.close-mid[i])**2,0)/p);return{u:mid[i]+m*std,m:mid[i],l:mid[i]-m*std}})}
function volRatio(d,p=20){return d.map((_,i)=>i<p?null:d[i].volume/(d.slice(i-p,i).reduce((s,x)=>s+x.volume,0)/p))}
function atr(d,p=14){const tr=d.map((x,i)=>i===0?x.high-x.low:Math.max(x.high-x.low,Math.abs(x.high-d[i-1].close),Math.abs(x.low-d[i-1].close)));return tr.map((_,i)=>i<p-1?null:tr.slice(i-p+1,i+1).reduce((s,x)=>s+x,0)/p)}

function buildCache(d){return{sma5:sma(d,5),sma25:sma(d,25),sma75:sma(d,75),ema9:ema(d,9),ema21:ema(d,21),rsi14:calcRsi(d,14),bb20:bbands(d,20,2),volR:volRatio(d,20),atr14:atr(d,14)}}

// ═══ CONDITIONS ═══
const CONDS={
  rsi_recovering:{name:"RSI反発",cat:"逆張り",fn:(d,i,c)=>c.rsi14[i]!=null&&c.rsi14[i-1]!=null&&c.rsi14[i-1]<=30&&c.rsi14[i]>30},
  ma_golden:{name:"GC(5/25)",cat:"トレンド",fn:(d,i,c)=>c.sma5[i]!=null&&c.sma25[i]!=null&&c.sma5[i-1]!=null&&c.sma25[i-1]!=null&&c.sma5[i-1]<=c.sma25[i-1]&&c.sma5[i]>c.sma25[i]},
  ma5_above_25:{name:"MA5>MA25",cat:"トレンド",fn:(d,i,c)=>c.sma5[i]!=null&&c.sma25[i]!=null&&c.sma5[i]>c.sma25[i]},
  price_above_75:{name:"価格>MA75",cat:"トレンド",fn:(d,i,c)=>c.sma75[i]!=null&&d[i].close>c.sma75[i]},
  bb_lower_bounce:{name:"BB下限反発",cat:"逆張り",fn:(d,i,c)=>c.bb20[i]?.l!=null&&c.bb20[i-1]?.l!=null&&d[i-1].close<=c.bb20[i-1].l&&d[i].close>c.bb20[i].l},
  vol_spike:{name:"出来高2倍",cat:"需給",fn:(d,i,c)=>c.volR[i]!=null&&c.volR[i]>=2.0},
  vol_spike15:{name:"出来高1.5倍",cat:"需給",fn:(d,i,c)=>c.volR[i]!=null&&c.volR[i]>=1.5},
  bullish:{name:"陽線",cat:"価格",fn:(d,i)=>d[i].close>d[i].open},
  up_1pct:{name:"+1%超",cat:"価格",fn:(d,i)=>i>0&&(d[i].close-d[i-1].close)/d[i-1].close>0.01},
  ema9_above_21:{name:"EMA9>21",cat:"トレンド",fn:(d,i,c)=>c.ema9[i]!=null&&c.ema21[i]!=null&&c.ema9[i]>c.ema21[i]},
  low_vol:{name:"ATR低下",cat:"ボラ",fn:(d,i,c)=>c.atr14[i]!=null&&i>=5&&c.atr14[i-5]!=null&&c.atr14[i]<c.atr14[i-5]*0.8},
};

const COMBOS=[
  {id:"C1",name:"RSI反発+BB+陽線",conds:["rsi_recovering","bb_lower_bounce","bullish"],hold:5},
  {id:"C2",name:"GC+75日線上+出来高",conds:["ma_golden","price_above_75","vol_spike15"],hold:10},
  {id:"C3",name:"RSI反発+トレンド上",conds:["rsi_recovering","ma5_above_25"],hold:7},
  {id:"C4",name:"BB反発+出来高急増",conds:["bb_lower_bounce","vol_spike"],hold:5},
  {id:"C5",name:"EMAモメンタム+出来高",conds:["ema9_above_21","price_above_75","vol_spike15","bullish"],hold:8},
  {id:"C6",name:"GC+陽線+1%超",conds:["ma_golden","bullish","up_1pct"],hold:7},
  {id:"C7",name:"トリプルトレンド",conds:["ma5_above_25","ema9_above_21","price_above_75"],hold:10},
  {id:"C8",name:"ATR低下→ブレイク",conds:["low_vol","vol_spike","bullish","up_1pct"],hold:7},
  {id:"C9",name:"RSI反発+75日線+出来高",conds:["rsi_recovering","price_above_75","vol_spike15"],hold:7},
  {id:"C10",name:"BB反発+トレンド上",conds:["bb_lower_bounce","ma5_above_25","bullish"],hold:7},
];

// ═══ BACKTEST ═══
function testCombo(stock,combo,cfg){
  const{capital=1000000,slip=5,stopLoss=0.05}=cfg;
  const data=stock.data,cache=buildCache(data),condFns=combo.conds.map(c=>CONDS[c]);
  const trades=[];let holdUntil=-1;
  for(let i=Math.max(76,1);i<data.length;i++){
    if(i<holdUntil)continue;
    const ok=condFns.every(c=>{try{return c.fn(data,i,cache)}catch{return false}});
    if(!ok)continue;
    const bp=data[i].close*(1+slip/10000);
    const sh=Math.floor((capital*0.95)/(bp*100))*100;
    if(sh<100)continue;
    const cost=bp*sh*1.001;
    let xi=Math.min(i+combo.hold,data.length-1),xr="期間決済",xp=data[xi].close;
    if(stopLoss){for(let j=i+1;j<=xi;j++){if((data[j].low-bp)/bp<=-stopLoss){xi=j;xp=bp*(1-stopLoss);xr="損切";break}}}
    if(xr==="期間決済")xp=data[xi].close;
    const sp=xp*(1-slip/10000),proc=sp*sh*0.999,pnl=proc-cost,retPct=(sp-bp)/bp;
    // Loss reason
    let lr=null;
    if(pnl<0){
      const vr=cache.volR[i];let gap=false;
      for(let j=i+1;j<=xi;j++){if(j>0&&(data[j].open-data[j-1].close)/data[j-1].close<-0.02){gap=true;break}}
      const quick=i+2<data.length&&(data[i+2].close-bp)/bp<-0.03;
      if(vr!=null&&vr>3&&!gap)lr="仕手疑い";else if(gap)lr="ファンダ";else if(quick)lr="ダマシ";else lr="トレンド逆行";
    }
    trades.push({nd:data[i].date,ep:Math.round(bp),ed:data[xi].date,xp:Math.round(sp),sh,pnl:Math.round(pnl),retPct,xr,lr,hd:xi-i});
    holdUntil=xi+1;
  }
  const w=trades.filter(t=>t.pnl>0),l=trades.filter(t=>t.pnl<=0);
  const gp=w.reduce((s,t)=>s+t.pnl,0),gl=Math.abs(l.reduce((s,t)=>s+t.pnl,0));
  const lossR={};l.forEach(t=>{lossR[t.lr]=(lossR[t.lr]||0)+1});
  return{trades,s:{n:trades.length,w:w.length,l:l.length,wr:trades.length?w.length/trades.length:0,pnl:gp-gl,gp,gl,pf:gl>0?gp/gl:gp>0?99:0,avgRet:trades.length?trades.reduce((s,t)=>s+t.retPct,0)/trades.length:0,avgWR:w.length?w.reduce((s,t)=>s+t.retPct,0)/w.length:0,avgLR:l.length?l.reduce((s,t)=>s+t.retPct,0)/l.length:0,lossR}};
}

// Check if conditions are met TODAY (last bar)
function checkToday(stock,combo){
  const data=stock.data;if(data.length<80)return{met:false};
  const cache=buildCache(data),i=data.length-1;
  const condFns=combo.conds.map(c=>CONDS[c]);
  const results=condFns.map((fn,j)=>{try{return{name:CONDS[combo.conds[j]].name,met:fn.fn(data,i,cache)}}catch{return{name:CONDS[combo.conds[j]].name,met:false}}});
  const allMet=results.every(r=>r.met);
  return{met:allMet,conditions:results,lastDate:data[i].date,lastPrice:data[i].close};
}

function calcScore(s){if(s.n<3)return-999;return Math.min(s.pf,5)*18+s.wr*55+Math.max(Math.min(s.avgRet*500,40),-40)-s.l*2-(s.n<5?20:0)}

// ═══ HELPERS ═══
const fN=n=>n?.toLocaleString("ja-JP")??"-";
const fP=n=>n!=null?(n*100).toFixed(1)+"%":"-";
const fY=n=>n!=null?"¥"+n.toLocaleString("ja-JP"):"-";
const LC={"仕手疑い":"#ff1744","ファンダ":"#ff9100","ダマシ":"#ffd740","トレンド逆行":"#b388ff"};

function Grade({sc,pf,wr}){
  let g,c;
  if(sc>=75&&pf>=1.8&&wr>=0.55){g="S";c="#00e5ff"}
  else if(sc>=50&&pf>=1.3){g="A";c="#00e676"}
  else if(sc>=25&&pf>=1.0){g="B";c="#ffd740"}
  else if(sc>=5){g="C";c="#ff9100"}
  else{g="D";c="#ff1744"}
  return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:6,fontSize:14,fontWeight:800,color:c,background:c+"15",border:`1px solid ${c}30`}} className="mono">{g}</span>;
}

// ═══ APP ═══
function App(){
  const[stocks,setStocks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const[dataSource,setDataSource]=useState("loading");
  const[view,setView]=useState("today");
  const[cfg]=useState({capital:1000000,slip:5,stopLoss:0.05});
  const[detail,setDetail]=useState(null);
  const[minTrades,setMinTrades]=useState(3);
  const[minWr,setMinWr]=useState(0);

  // Fetch real data
  useEffect(()=>{
    async function load(){
      setLoading(true);setError(null);
      try{
        // Try API first
        const res=await fetch("/api/stocks?tickers=7203,6758,9984,8306,6861,4063,6501,7974,8035,6723&period=1y");
        if(!res.ok)throw new Error("API error: "+res.status);
        const json=await res.json();
        if(json.stocks&&json.stocks.length>0&&json.stocks[0].data?.length>50){
          setStocks(json.stocks);setDataSource("real");setLoading(false);
          // Load more in background
          fetch("/api/stocks?tickers=4519,6594,6367,4568,7741,6981,9433,9432,6902,3382&period=1y")
            .then(r=>r.json()).then(j2=>{if(j2.stocks)setStocks(prev=>[...prev,...j2.stocks.filter(s=>s.data?.length>50)])}).catch(()=>{});
          return;
        }
        throw new Error("Insufficient data");
      }catch(e){
        console.log("API failed, using demo data:",e.message);
        setStocks(generateDemoStocks());setDataSource("demo");setLoading(false);
      }
    }
    load();
  },[]);

  // Demo data fallback
  function generateDemoStocks(){
    function R(s){let x=s;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646}}
    function gen(tk,nm,bp,vol,tr,seed){
      const r=R(seed),data=[];let p=bp,m=0;
      for(let i=0;i<350;i++){const dt=new Date(2025,0,6);dt.setDate(dt.getDate()+Math.floor(i*1.4));if(dt.getDay()===0||dt.getDay()===6)continue;const r1=r(),r2=r();const n=Math.sqrt(-2*Math.log(Math.max(r1,.0001)))*Math.cos(2*Math.PI*r2);m=m*.92+n*.08;let ret=tr/252+vol*n/Math.sqrt(252)+m*.003;p*=(1+ret);data.push({date:dt.toISOString().slice(0,10),open:Math.round(p*(1+(r()-.5)*.004)),high:Math.round(p*(1+r()*vol*.018)),low:Math.round(p*(1-r()*vol*.018)),close:Math.round(p),volume:Math.floor(400000+r()*1800000)})}
      return{ticker:tk,name:nm,data};
    }
    return[gen("7203","トヨタ自動車",2800,.22,.05,3001),gen("6758","ソニーG",13000,.28,.08,3002),gen("9984","ソフトバンクG",6500,.35,-.02,3003),gen("8306","三菱UFJFG",1200,.20,.06,3004),gen("6861","キーエンス",62000,.25,.10,3005),gen("4063","信越化学",5500,.24,.04,3006),gen("6501","日立製作所",9800,.26,.07,3007),gen("7974","任天堂",7200,.30,.03,3008),gen("8035","東京エレクトロン",28000,.32,.12,3009),gen("6723","ルネサス",2600,.34,.06,3010),gen("4519","中外製薬",5200,.26,.09,3011),gen("6594","日本電産",7800,.30,-.03,3012),gen("6367","ダイキン工業",25000,.22,.06,3013),gen("4568","第一三共",4500,.28,.11,3014),gen("7741","HOYA",18000,.24,.08,3015),gen("6981","村田製作所",2800,.27,.05,3016),gen("9433","KDDI",4300,.17,.04,3017),gen("9432","NTT",170,.18,.03,3018),gen("6902","デンソー",2200,.24,.04,3019),gen("3382","セブン&iHD",2000,.20,.01,3020)];
  }

  // All backtest results
  const allResults=useMemo(()=>{
    if(!stocks.length)return[];
    const res=[];
    for(const combo of COMBOS){for(const stock of stocks){
      if(stock.data?.length<80)continue;
      const result=testCombo(stock,combo,cfg);
      const sc=calcScore(result.s);
      const today=checkToday(stock,combo);
      res.push({combo,stock,result,sc,today});
    }}
    return res.sort((a,b)=>b.sc-a.sc);
  },[stocks,cfg]);

  // Today's signals
  const todaySignals=useMemo(()=>{
    return allResults.filter(r=>r.today.met&&r.result.s.n>=3&&r.result.s.pf>=1.0).sort((a,b)=>b.sc-a.sc);
  },[allResults]);

  const filtered=useMemo(()=>
    allResults.filter(r=>r.result.s.n>=minTrades&&r.result.s.wr>=minWr/100),
  [allResults,minTrades,minWr]);

  // ─── RENDER ───
  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div className="loading-pulse" style={{fontSize:12,color:"#00e5ff",fontFamily:"'JetBrains Mono'"}}>株価データを取得中...</div>
      <div style={{width:200,height:3,background:"#182030",borderRadius:2,overflow:"hidden"}}>
        <div style={{width:"60%",height:"100%",background:"#00e5ff",borderRadius:2,animation:"pulse 1.5s ease-in-out infinite"}}/>
      </div>
    </div>
  );

  return(
    <div style={{maxWidth:960,margin:"0 auto",padding:"0 0 50px"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(170deg,#060a10,#0d1a28)",borderBottom:"1px solid #182030",padding:"16px"}}>
        <div className="flex items-c gap6" style={{marginBottom:5}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#00e5ff",boxShadow:"0 0 12px #00e5ff"}}/>
          <span className="mono" style={{fontSize:9,color:"#00e5ff",letterSpacing:3,textTransform:"uppercase"}}>Swing Trade Lab</span>
          <span style={{marginLeft:"auto",fontSize:9,padding:"2px 8px",borderRadius:4,fontFamily:"'JetBrains Mono'",
            background:dataSource==="real"?"#00e67615":"#ffd74015",
            color:dataSource==="real"?"#00e676":"#ffd740",
            border:`1px solid ${dataSource==="real"?"#00e67633":"#ffd74033"}`}}>
            {dataSource==="real"?"実データ接続中":"デモデータ"}
          </span>
        </div>
        <h1 style={{fontSize:18,fontWeight:700}}>スイングトレード・スクリーナー</h1>
        <p style={{fontSize:11,color:"#8094a8",marginTop:3}}>{stocks.length}銘柄 × {COMBOS.length}コンボ = {stocks.length*COMBOS.length}パターン自動検証</p>
      </div>

      <div style={{padding:"14px"}}>
        {/* NAV */}
        <div className="flex wrap gap4" style={{marginBottom:14}}>
          {[["today","今日の推奨"],["screening","スクリーニング"],["combos","コンボ分析"],["losslab","敗因ラボ"]].map(([k,l])=>
            <button key={k} onClick={()=>{setView(k);setDetail(null)}} className={`btn ${view===k?"active":""}`}>{l}
              {k==="today"&&todaySignals.length>0&&<span style={{marginLeft:4,background:"#ff1744",color:"#fff",borderRadius:8,padding:"1px 5px",fontSize:9}}>{todaySignals.length}</span>}
            </button>
          )}
        </div>

        {/* ═══ TODAY'S PICKS ═══ */}
        {view==="today"&&(
          <>
            <div className="card" style={{background:"linear-gradient(135deg,#00e5ff08,#00e67608)",borderColor:"#00e5ff33",padding:16}}>
              <div className="mono" style={{fontSize:10,color:"#00e5ff",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>
                {dataSource==="real"?"本日のシグナル":"シミュレーション結果"}
              </div>
              <div style={{fontSize:12,color:"#8094a8",lineHeight:1.7}}>
                以下の銘柄は、<strong style={{color:"#e4eaf2"}}>現在の最新データ</strong>で買い条件が成立しています。
                括弧内の勝率は、同じ条件が過去に成立した際の実績です。
                {dataSource!=="real"&&<span style={{color:"#ffd740"}}> ※デモデータのためAPIサーバー接続後に実データに切り替わります。</span>}
              </div>
            </div>

            {todaySignals.length===0?(
              <div className="card" style={{textAlign:"center",color:"#4a5e70",padding:40}}>
                現在、全条件が成立している銘柄はありません。<br/>
                <span style={{fontSize:11}}>条件が部分的に成立している銘柄は「スクリーニング」タブで確認できます。</span>
              </div>
            ):(
              todaySignals.map((r,i)=>{
                const s=r.result.s;
                return(
                  <div key={i} className={`card ${i<3?"card-hi":""}`} onClick={()=>{setDetail(r);setView("screening")}} style={{cursor:"pointer"}}>
                    <div className="flex items-c gap8 wrap">
                      <Grade sc={r.sc} pf={s.pf} wr={s.wr}/>
                      <div style={{flex:"1 1 180px",minWidth:150}}>
                        <div style={{fontSize:14,fontWeight:700}}>
                          <span className="acc mono">{r.stock.ticker}</span>
                          <span style={{marginLeft:6}}>{r.stock.name}</span>
                          <span className="mono" style={{marginLeft:8,fontSize:11,color:"#8094a8"}}>¥{fN(r.today.lastPrice)}</span>
                        </div>
                        <div style={{fontSize:10,color:"#8094a8",marginTop:2}}>{r.combo.name}</div>
                        <div className="flex gap4 wrap" style={{marginTop:4}}>
                          {r.today.conditions?.map((c,j)=>
                            <span key={j} className="mono" style={{padding:"2px 6px",borderRadius:4,fontSize:8,
                              background:c.met?"#00e67615":"#ff174415",
                              color:c.met?"#00e676":"#ff1744",
                              border:`1px solid ${c.met?"#00e67633":"#ff174433"}`}}>
                              {c.met?"✓":"✗"} {c.name}
                            </span>
                          )}
                        </div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div className="mono" style={{fontSize:9,color:"#4a5e70"}}>過去勝率</div>
                        <div className="mono" style={{fontSize:28,fontWeight:800,color:s.wr>=0.6?"#00e676":s.wr>=0.5?"#ffd740":"#ff9100"}}>{(s.wr*100).toFixed(0)}%</div>
                        <div className="mono" style={{fontSize:9,color:"#8094a8"}}>{s.n}回中{s.w}勝</div>
                      </div>
                    </div>
                  </div>
                );
              })
            )}

            {/* Near-miss section */}
            {(()=>{
              const nearMiss=allResults.filter(r=>{
                if(r.today.met||r.result.s.n<3||r.result.s.pf<1.0)return false;
                const conds=r.today.conditions||[];
                const metCount=conds.filter(c=>c.met).length;
                return metCount>=conds.length-1&&metCount>0;
              }).sort((a,b)=>b.sc-a.sc).slice(0,10);
              
              if(!nearMiss.length)return null;
              return(
                <>
                  <div className="card" style={{padding:"10px 14px",marginTop:8}}>
                    <div className="mono" style={{fontSize:9,color:"#ffd740",letterSpacing:1.5,textTransform:"uppercase"}}>あと1条件で成立（ウォッチリスト候補）</div>
                  </div>
                  {nearMiss.map((r,i)=>{
                    const conds=r.today.conditions||[];
                    const missing=conds.filter(c=>!c.met);
                    return(
                      <div key={i} className="card" style={{padding:"10px 14px",opacity:0.8}}>
                        <div className="flex items-c gap8 wrap">
                          <div style={{flex:1}}>
                            <span className="acc mono" style={{fontSize:12}}>{r.stock.ticker}</span>
                            <span style={{marginLeft:6,fontSize:12}}>{r.stock.name}</span>
                            <span className="mono dim" style={{marginLeft:6,fontSize:10}}>({r.combo.name})</span>
                          </div>
                          <div className="mono" style={{fontSize:10}}>
                            <span className="ylw">未成立: {missing.map(m=>m.name).join(", ")}</span>
                          </div>
                          <div className="mono" style={{fontSize:11,color:r.result.s.wr>=0.5?"#00e676":"#8094a8"}}>
                            勝率{fP(r.result.s.wr)}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </>
              );
            })()}
          </>
        )}

        {/* ═══ SCREENING ═══ */}
        {view==="screening"&&!detail&&(
          <>
            <div className="flex wrap gap6" style={{marginBottom:10}}>
              <div><div className="label">最小取引数</div>
                <select value={minTrades} onChange={e=>setMinTrades(+e.target.value)} className="sel">
                  {[1,3,5,8].map(v=><option key={v} value={v}>{v}回以上</option>)}
                </select></div>
              <div><div className="label">最低勝率</div>
                <select value={minWr} onChange={e=>setMinWr(+e.target.value)} className="sel">
                  {[0,40,50,60].map(v=><option key={v} value={v}>{v}%以上</option>)}
                </select></div>
              <div className="mono" style={{marginLeft:"auto",fontSize:10,color:"#4a5e70",alignSelf:"flex-end"}}>{filtered.length}件</div>
            </div>
            {filtered.slice(0,40).map((r,i)=>{
              const s=r.result.s;
              return(
                <div key={i} className={`card ${i<3?"card-hi":""}`} onClick={()=>setDetail(r)} style={{cursor:"pointer",padding:"12px 14px"}}>
                  <div className="flex items-c gap8 wrap">
                    <span className="mono" style={{fontSize:11,color:i<3?"#00e5ff":"#4a5e70",width:24,textAlign:"right"}}>#{i+1}</span>
                    <Grade sc={r.sc} pf={s.pf} wr={s.wr}/>
                    <div style={{flex:"1 1 180px",minWidth:140}}>
                      <div style={{fontSize:13,fontWeight:600}}>
                        <span className="acc mono">{r.stock.ticker}</span> {r.stock.name}
                      </div>
                      <div style={{fontSize:10,color:"#8094a8"}}>{r.combo.name}</div>
                    </div>
                    <div className="flex gap14 wrap mono" style={{fontSize:11}}>
                      <div style={{textAlign:"center"}}><div style={{fontSize:9}} className="mut">勝率</div><div style={{fontSize:15,fontWeight:700,color:s.wr>=0.6?"#00e676":s.wr>=0.5?"#ffd740":"#ff1744"}}>{fP(s.wr)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:9}} className="mut">PF</div><div style={{fontWeight:600,color:s.pf>=1.5?"#00e676":"#ffd740"}}>{s.pf>=99?"∞":s.pf.toFixed(2)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:9}} className="mut">損益</div><div style={{fontWeight:600,color:s.avgRet>=0?"#00e676":"#ff1744"}}>{(s.avgRet*100).toFixed(2)}%</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:9}} className="mut">回数</div><div>{s.n}</div></div>
                      {r.today.met&&<span style={{background:"#00e5ff22",color:"#00e5ff",padding:"2px 6px",borderRadius:4,fontSize:9,alignSelf:"center"}}>本日成立</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* ═══ DETAIL ═══ */}
        {view==="screening"&&detail&&(()=>{
          const s=detail.result.s,t=detail.result.trades;
          const lrData=Object.entries(s.lossR).map(([k,v])=>({name:k,value:v,fill:LC[k]||"#4a5e70"}));
          return(
            <>
              <button onClick={()=>setDetail(null)} className="btn" style={{borderColor:"#00e5ff",color:"#00e5ff",marginBottom:12}}>← 戻る</button>
              
              <div className="card card-hi" style={{padding:16}}>
                <div className="flex items-c gap8" style={{marginBottom:10}}>
                  <Grade sc={detail.sc} pf={s.pf} wr={s.wr}/>
                  <div><div style={{fontSize:16,fontWeight:700}}><span className="acc mono">{detail.stock.ticker}</span> {detail.stock.name}</div>
                  <div style={{fontSize:11,color:"#8094a8"}}>{detail.combo.name}</div></div>
                </div>
                <div className="flex gap4 wrap" style={{marginBottom:10}}>
                  {detail.combo.conds.map(c=><span key={c} className="mono" style={{background:"#00e5ff15",border:"1px solid #00e5ff33",padding:"2px 8px",borderRadius:4,fontSize:9,color:"#00e5ff"}}>{CONDS[c]?.name}</span>)}
                </div>
              </div>

              {/* Probability */}
              <div className="card" style={{background:"linear-gradient(135deg,#00e5ff06,transparent)",borderColor:"#00e5ff33",padding:20}}>
                <div className="mono" style={{fontSize:10,color:"#00e5ff",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>勝利確率</div>
                <div className="flex items-c gap8" style={{marginBottom:8}}>
                  <span className="mono" style={{fontSize:48,fontWeight:800,color:s.wr>=0.6?"#00e676":s.wr>=0.5?"#ffd740":"#ff1744"}}>{(s.wr*100).toFixed(1)}</span>
                  <span style={{fontSize:20,color:"#8094a8"}}>%</span>
                  <span className="mono" style={{fontSize:12,color:"#8094a8",marginLeft:8}}>({s.n}回中{s.w}勝)</span>
                </div>
                <div style={{fontSize:12,color:"#8094a8",lineHeight:1.7}}>
                  勝ち平均: <span className="grn">+{(s.avgWR*100).toFixed(2)}%</span> / 負け平均: <span className="red">{(s.avgLR*100).toFixed(2)}%</span>
                </div>
                {detail.today.met&&<div style={{marginTop:8,padding:"8px 12px",background:"#00e67615",borderRadius:6,border:"1px solid #00e67633",fontSize:12,color:"#00e676"}}>⚡ この条件は現在の最新データで成立しています</div>}
              </div>

              {/* Stats */}
              <div className="flex wrap gap8" style={{marginBottom:12}}>
                {[{l:"PF",v:s.pf>=99?"∞":s.pf.toFixed(2),c:s.pf>=1.5?"#00e676":"#ffd740"},
                  {l:"総損益",v:fY(s.pnl),c:s.pnl>=0?"#00e676":"#ff1744"},
                  {l:"保有",v:detail.combo.hold+"日"},
                ].map((x,i)=>
                  <div key={i} className="card" style={{flex:"1 1 90px",marginBottom:0}}>
                    <div className="label">{x.l}</div>
                    <div className="mono" style={{fontSize:18,fontWeight:700,color:x.c||"#e4eaf2"}}>{x.v}</div>
                  </div>
                )}
              </div>

              {/* Loss reasons */}
              {lrData.length>0&&(
                <div className="card">
                  <div className="label" style={{color:"#ff1744",marginBottom:8}}>敗因分析</div>
                  {lrData.map((d,i)=>(
                    <div key={i} className="flex items-c gap8" style={{marginBottom:4}}>
                      <div style={{width:10,height:10,borderRadius:2,background:d.fill}}/>
                      <span style={{flex:1,fontSize:12}}>{d.name}</span>
                      <span className="mono" style={{color:d.fill,fontWeight:600}}>{d.value}回</span>
                    </div>
                  ))}
                  <div style={{fontSize:10,color:"#8094a8",marginTop:8,lineHeight:1.6,borderTop:"1px solid #182030",paddingTop:8}}>
                    {s.lossR["仕手疑い"]>0&&<div>⚠ <span style={{color:"#ff1744"}}>仕手疑い</span>: 出来高異常→板の薄い銘柄で注意</div>}
                    {s.lossR["ファンダ"]>0&&<div>📰 <span style={{color:"#ff9100"}}>ファンダ</span>: 決算前後のエントリー回避を検討</div>}
                    {s.lossR["ダマシ"]>0&&<div>🔄 <span style={{color:"#ffd740"}}>ダマシ</span>: 確認足を1日追加するか追加フィルタを</div>}
                    {s.lossR["トレンド逆行"]>0&&<div>📉 <span style={{color:"#b388ff"}}>トレンド逆行</span>: 市場全体のフィルタ追加を検討</div>}
                  </div>
                </div>
              )}

              {/* PnL Chart */}
              <div className="card">
                <div className="label" style={{marginBottom:6}}>取引損益</div>
                <ResponsiveContainer width="100%" height={140}>
                  <BarChart data={t.map((x,i)=>({i:i+1,pnl:x.pnl}))}>
                    <CartesianGrid stroke="#152030" strokeDasharray="3 3"/>
                    <XAxis dataKey="i" tick={{fontSize:9,fill:"#4a5e70"}}/>
                    <YAxis tick={{fontSize:9,fill:"#4a5e70"}} tickFormatter={v=>(v/1000).toFixed(0)+"K"}/>
                    <ReferenceLine y={0} stroke="#4a5e70"/>
                    <Bar dataKey="pnl" radius={[2,2,0,0]}>{t.map((x,i)=><Cell key={i} fill={x.pnl>=0?"#00e676":LC[x.lr]||"#ff1744"} opacity={0.8}/>)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>

              {/* Trades */}
              <div className="card">
                <div className="label" style={{marginBottom:6}}>取引履歴</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}} className="mono">
                    <thead><tr style={{borderBottom:"1px solid #182030"}}>
                      {["買日","売日","損益","損益%","敗因"].map(h=><th key={h} style={{padding:"5px 4px",color:"#4a5e70",fontWeight:500,textAlign:"left",fontSize:9}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{t.slice(-15).reverse().map((x,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid #18203018"}}>
                        <td style={{padding:"4px",color:"#8094a8"}}>{x.nd?.slice(5)}</td>
                        <td style={{padding:"4px",color:"#8094a8"}}>{x.ed?.slice(5)}</td>
                        <td style={{padding:"4px",color:x.pnl>0?"#00e676":"#ff1744",fontWeight:600}}>{fY(x.pnl)}</td>
                        <td style={{padding:"4px",color:x.retPct>0?"#00e676":"#ff1744"}}>{(x.retPct*100).toFixed(2)}%</td>
                        <td style={{padding:"4px",color:LC[x.lr]||"#8094a8",fontSize:9}}>{x.lr||"—"}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            </>
          );
        })()}

        {/* ═══ COMBOS ═══ */}
        {view==="combos"&&(()=>{
          const summaries=COMBOS.map(combo=>{
            const results=allResults.filter(r=>r.combo.id===combo.id&&r.result.s.n>=3);
            if(!results.length)return{combo,avgWr:0,avgPf:0,total:0,winners:0};
            return{combo,
              avgWr:results.reduce((s,r)=>s+r.result.s.wr,0)/results.length,
              avgPf:results.reduce((s,r)=>s+Math.min(r.result.s.pf,10),0)/results.length,
              avgRet:results.reduce((s,r)=>s+r.result.s.avgRet,0)/results.length,
              total:results.length,
              winners:results.filter(r=>r.result.s.pf>=1.3&&r.result.s.wr>=0.5).length,
            };
          }).sort((a,b)=>b.avgPf-a.avgPf);
          return summaries.map((cs,i)=>(
            <div key={i} className="card" style={{borderColor:cs.avgPf>=1.5?"#00e67633":"#182030"}}>
              <div className="flex items-c gap8 wrap" style={{marginBottom:8}}>
                <span className="mono" style={{fontSize:11,color:"#4a5e70"}}>#{i+1}</span>
                <span style={{fontSize:13,fontWeight:700,flex:1}}>{cs.combo.name}</span>
              </div>
              <div className="flex gap4 wrap" style={{marginBottom:8}}>
                {cs.combo.conds.map(c=><span key={c} className="mono" style={{background:"#182030",padding:"1px 5px",borderRadius:3,fontSize:8,color:"#8094a8"}}>{CONDS[c]?.name}</span>)}
              </div>
              <div className="flex gap14 wrap mono" style={{fontSize:11}}>
                <span><span className="mut" style={{fontSize:9}}>平均勝率 </span><span style={{color:cs.avgWr>=0.5?"#00e676":"#ffd740",fontWeight:600}}>{fP(cs.avgWr)}</span></span>
                <span><span className="mut" style={{fontSize:9}}>平均PF </span><span style={{color:cs.avgPf>=1.5?"#00e676":"#ffd740",fontWeight:600}}>{cs.avgPf?.toFixed(2)}</span></span>
                <span><span className="mut" style={{fontSize:9}}>勝てる銘柄 </span><span className="grn" style={{fontWeight:600}}>{cs.winners}/{cs.total}</span></span>
                <span><span className="mut" style={{fontSize:9}}>保有 </span>{cs.combo.hold}日</span>
              </div>
            </div>
          ));
        })()}

        {/* ═══ LOSS LAB ═══ */}
        {view==="losslab"&&(()=>{
          const all=allResults.flatMap(r=>r.result.trades.filter(t=>t.pnl<0).map(t=>({...t,stock:r.stock.name,tk:r.stock.ticker,combo:r.combo.name})));
          const by={};all.forEach(l=>{const k=l.lr||"不明";if(!by[k])by[k]={c:0,loss:0};by[k].c++;by[k].loss+=l.pnl});
          const rd=Object.entries(by).map(([k,v])=>({name:k,count:v.c,loss:v.loss,avg:v.loss/v.c,fill:LC[k]||"#4a5e70"})).sort((a,b)=>a.loss-b.loss);
          return(
            <>
              <div className="card" style={{background:"#ff174408",borderColor:"#ff174422",padding:14}}>
                <div className="mono" style={{fontSize:10,color:"#ff1744",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>敗因研究ラボ</div>
                <div style={{fontSize:11,color:"#8094a8"}}>全{all.length}件の負けトレードを分類。最も損失が大きいカテゴリを改善すれば全体の勝率が向上します。</div>
              </div>
              {rd.map((d,i)=>(
                <div key={i} className="card" style={{borderColor:d.fill+"33"}}>
                  <div className="flex items-c gap8" style={{marginBottom:8}}>
                    <div style={{width:12,height:12,borderRadius:3,background:d.fill}}/>
                    <span style={{fontSize:14,fontWeight:700,color:d.fill}}>{d.name}</span>
                  </div>
                  <div className="flex gap14 mono" style={{fontSize:11,marginBottom:6}}>
                    <span>{d.count}回</span>
                    <span style={{color:"#ff1744"}}>総損失: {fY(d.loss)}</span>
                    <span style={{color:"#ff1744"}}>平均: {fY(Math.round(d.avg))}</span>
                  </div>
                  <div style={{fontSize:10,color:"#8094a8",lineHeight:1.7}}>
                    {d.name==="仕手疑い"&&"💡 対策: 出来高が通常の3倍超の異常値を示す銘柄をフィルタで除外。時価総額が小さい銘柄は特に注意。"}
                    {d.name==="ファンダ"&&"💡 対策: 決算発表日の前後5営業日はエントリーを自動スキップ。J-QuantsのIRデータと照合可能。"}
                    {d.name==="ダマシ"&&"💡 対策: エントリーシグナルの翌日も陽線継続なら確定（確認足ルール追加）で偽シグナルを大幅に減少可能。"}
                    {d.name==="トレンド逆行"&&"💡 対策: 日経平均が25日線を下回っている期間はエントリーをスキップする市場フィルタが有効。"}
                  </div>
                </div>
              ))}
              <div className="card">
                <div className="label" style={{marginBottom:6}}>最大損失トレード</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}} className="mono">
                    <thead><tr style={{borderBottom:"1px solid #182030"}}>
                      {["銘柄","コンボ","損益","敗因"].map(h=><th key={h} style={{padding:"5px 4px",color:"#4a5e70",fontWeight:500,textAlign:"left",fontSize:9}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{all.sort((a,b)=>a.pnl-b.pnl).slice(0,10).map((l,i)=>(
                      <tr key={i} style={{borderBottom:"1px solid #18203018"}}>
                        <td style={{padding:"4px"}}><span className="acc">{l.tk}</span> {l.stock}</td>
                        <td style={{padding:"4px",color:"#8094a8",fontSize:9}}>{l.combo}</td>
                        <td style={{padding:"4px",color:"#ff1744",fontWeight:600}}>{fY(l.pnl)}</td>
                        <td style={{padding:"4px",color:LC[l.lr]||"#8094a8"}}>{l.lr}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            </>
          );
        })()}

        {/* Footer */}
        <div style={{textAlign:"center",padding:"20px 0",fontSize:9,color:"#4a5e70",lineHeight:1.7}}>
          {dataSource==="real"?"実際の株価データを使用しています。":"デモデータで動作中。サーバーデプロイ後に実データに切り替わります。"}<br/>
          過去の成績は将来を保証しません。投資は自己責任でお願いします。<br/>
          <span style={{color:"#00e5ff"}}>Swing Trade Lab</span> — Real Data Edition
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
